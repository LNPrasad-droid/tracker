<!doctype html>
<html lang="en" style="background-color: #020408;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leo OS // Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at center, #071225, #020408 70%);
        color: #e2e8f0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(90vw, 520px);
        border: 1px solid rgba(56, 189, 248, 0.22);
        border-radius: 28px;
        padding: 32px;
        background: rgba(15, 23, 42, 0.72);
        box-shadow: 0 0 48px rgba(56, 189, 248, 0.12);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }
      p {
        margin: 0;
        color: #94a3b8;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Leo OS is offline</h1>
      <p>The app shell is cached. Reconnect to sync your latest MySQL-backed productivity data.</p>
    </main>
  </body>
</html>
